<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>ジャグラー解析 Web App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.css" />
    <style>
        /* スマホ向けに微調整 */
        body { background-color: #1a1a2e; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script src="https://cdn.jsdelivr.net/npm/@stlite/mountable@0.39.0/build/stlite.js"></script>
    <script>
      stlite.mount({
        requirements: ["pandas"],
        entrypoint: "app.py",
        files: {
          "app.py": `
import streamlit as st
import pandas as pd

# データ定義
MACHINE_DATA = {
    "Sアイム": {"ぶどう": [1/6.02, 1/6.02, 1/6.02, 1/6.02, 1/6.02, 1/5.78], "チェリー": [1/35.5, 1/35.1, 1/34.8, 1/34.1, 1/33.5, 1/32.6]},
    "SマイジャグV": {"ぶどう": [1/5.94, 1/5.89, 1/5.84, 1/5.79, 1/5.74, 1/5.66], "チェリー": [1/37.3, 1/36.9, 1/36.4, 1/35.9, 1/35.5, 1/34.7]},
    "Sファンキー2": {"ぶどう": [1/6.01, 1/5.95, 1/5.89, 1/5.83, 1/5.76, 1/5.66], "チェリー": [1/36.4, 1/36.1, 1/35.7, 1/35.3, 1/34.9, 1/34.1]},
    "Sゴーゴー3": {"ぶどう": [1/6.50, 1/6.43, 1/6.35, 1/6.28, 1/6.21, 1/6.14], "チェリー": [1/35.1, 1/34.4, 1/33.8, 1/33.1, 1/32.4, 1/31.8]},
    "SハッピーV3": {"ぶどう": [1/5.94, 1/5.91, 1/5.88, 1/5.85, 1/5.81, 1/5.76], "チェリー": [1/33.9, 1/32.5, 1/31.1, 1/29.9, 1/28.7, 1/27.4]},
    "SガールズSS": {"ぶどう": [1/6.15, 1/6.08, 1/6.00, 1/5.92, 1/5.84, 1/5.75], "チェリー": [1/35.2, 1/34.6, 1/34.1, 1/33.6, 1/33.1, 1/32.4]},
    "Sミスター": {"ぶどう": [1/5.96, 1/5.89, 1/5.82, 1/5.75, 1/5.68, 1/5.64], "チェリー": [1/36.0, 1/35.5, 1/35.0, 1/34.5, 1/34.0, 1/33.0]},
}

st.set_page_config(page_title="JUG ANALYZER", layout="centered")

# セッション管理
if "counts" not in st.session_state:
    st.session_state.counts = {"ぶどう": 0, "チェリー": 0}
if "games" not in st.session_state:
    st.session_state.games = 0

st.title("🎰 子役カウンター")

# --- 設定エリア ---
with st.expander("機種・設定選択", expanded=True):
    machine = st.selectbox("機種", list(MACHINE_DATA.keys()))
    setting = st.select_slider("目標設定", options=[1, 2, 3, 4, 5, 6], value=6)
    st.session_state.games = st.number_input("現在の総ゲーム数", value=st.session_state.games, step=100)

# --- カウンターボタン ---
st.write("### カウント")
c1, c2 = st.columns(2)

def add_count(target):
    st.session_state.counts[target] += 1

with c1:
    if st.button(f"🍇 ぶどう\\n{st.session_state.counts['ぶどう']}", use_container_width=True):
        add_count("ぶどう")
with c2:
    if st.button(f"🍒 チェリー\\n{st.session_state.counts['チェリー']}", use_container_width=True):
        add_count("チェリー")

if st.button("リセット", type="secondary"):
    st.session_state.counts = {"ぶどう": 0, "チェリー": 0}
    st.session_state.games = 0
    st.rerun()

# --- 解析結果 ---
st.write("### 解析結果")
games = st.session_state.games
if games > 0:
    results = []
    for yaku in ["ぶどう", "チェリー"]:
        cnt = st.session_state.counts[yaku]
        actual = games / cnt if cnt > 0 else 0
        theory = MACHINE_DATA[machine][yaku][setting-1]
        diff = (cnt / games) / theory if theory > 0 else 0
        
        results.append({
            "子役": yaku,
            "実績": f"1/{actual:.2f}" if actual > 0 else "-",
            "理論(設定{setting})": f"1/{1/theory:.1f}",
            "設定比": f"{diff:.2f}倍"
        })
    st.table(pd.DataFrame(results))
else:
    st.info("ゲーム数を入力してください")
`
        }
      });
    </script>
  </body>
</html>
